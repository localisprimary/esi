name: Update ESI Schema

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate, build, and test
        run: pnpm compile

      - name: Check for meaningful generated changes
        id: generated-check
        run: |
          # COMPATIBILITY_DATE always changes on regeneration.
          # If that's the only changed line in src/, skip the PR.
          if git diff --quiet -I COMPATIBILITY_DATE -- src/ README.md; then
            echo "meaningful=false" >> $GITHUB_OUTPUT
            echo "No meaningful generated changes detected, skipping PR"
          else
            echo "meaningful=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit generated changes
        if: steps.generated-check.outputs.meaningful == 'true'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

          git add -A
          git commit -m "chore: Update ESI schema and generated files"

      - name: Create changefile
        if: steps.generated-check.outputs.meaningful == 'true'
        run: |
          pnpm beachball change \
            --branch master \
            --type patch \
            --dependent-change-type patch \
            --message "Automated: Update ESI OpenAPI schema" \
            --no-commit

      - name: Create Pull Request
        if: steps.generated-check.outputs.meaningful == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            Update EVE ESI schema

            🤖 Automated update from latest ESI OpenAPI schema
          title: 'chore: Update EVE ESI schema'
          body: |
            ## ESI Schema Update

            This PR contains an automated update to the EVE ESI schema.

          branch: automated/update-esi-schema
          branch-suffix: timestamp
          delete-branch: true
